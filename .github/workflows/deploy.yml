name: Deploy to Azure Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip package
        run: zip -r deploy.zip . -x "*.git*" -x "deploy.zip"

      - name: Deploy via zip deploy
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          USERNAME=$(echo $PUBLISH_PROFILE | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo $PUBLISH_PROFILE | grep -oP 'userPWD="\K[^"]+' | head -1)
          curl -X POST \
            "https://inbox-marketing-to-trello-app-had5hrcpaha4d3ej.scm.centralus-01.azurewebsites.net/api/publish?RemoteBuild=true" \
            -u "$USERNAME:$PASSWORD" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            --fail \
            -v